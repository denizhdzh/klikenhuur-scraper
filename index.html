<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio & Werkruimte — Nijmegen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --card: #1a1a1a;
      --card-hover: #1f1f1f;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --faint: #222;
      --mp: #ff4d4d;
      --funda: #ff9f40;
      --green: #4ade80;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 40px 32px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .header-left h1 em {
      font-style: normal;
      color: var(--muted);
    }

    .header-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .pill {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--faint);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .pill-mp    { color: var(--mp);    border-color: #3a1f1f; background: #1f1515; }
    .pill-funda { color: var(--funda); border-color: #3a2a1a; background: #1f1a10; }

    .header-right {
      text-align: right;
    }

    #updated {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    #count-label {
      font-size: 0.78rem;
      color: var(--muted);
    }

    #count-label b { color: var(--text); }

    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    #sort-select {
      font-size: 0.75rem;
      background: var(--faint);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      transition: background 0.15s;
    }

    .card:hover { background: var(--card-hover); }

    .card a {
      display: flex;
      flex-direction: column;
      height: 100%;
      text-decoration: none;
      color: inherit;
    }

    /* Image */
    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/2;
      overflow: hidden;
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .card-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .card:hover .card-img { transform: scale(1.03); }

    .card-img-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img-placeholder svg { opacity: 0.1; }

    .price-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .price-badge.unknown {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .source-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
    }

    .src-marktplaats    { color: var(--mp); }
    .src-fundainbusiness { color: var(--funda); }

    /* Body */
    .card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.45;
      color: #ccc;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .area-tag {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--green);
      background: #0f2318;
      border: 1px solid #1a3a25;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .date-tag {
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── State ── */
    .state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 24px 16px 20px; }
      .toolbar { padding: 10px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Studio &amp; Werkruimte<br><em>Nijmegen</em></h1>
    <div class="header-pills">
      <span class="pill">Max €700/m</span>
      <span class="pill">Min 15 m²</span>
      <span class="pill pill-mp">Marktplaats</span>
      <span class="pill pill-funda">Funda in Business</span>
    </div>
  </div>
  <div class="header-right">
    <div id="updated" style="color:var(--muted);font-size:.72rem">—</div>
  </div>
</header>

<div class="toolbar">
  <span id="count-label"></span>
  <div class="sort-wrap">
    <select id="sort-select">
      <option value="date">Nieuwste eerst</option>
      <option value="price-asc">Prijs ↑</option>
      <option value="price-desc">Prijs ↓</option>
      <option value="area-asc">Oppervlakte ↑</option>
    </select>
  </div>
</div>

<div class="grid" id="grid">
  <div class="state">Laden...</div>
</div>

<script>
const SRC = {
  marktplaats:     { label: 'Marktplaats',       cls: 'src-marktplaats' },
  fundainbusiness: { label: 'Funda in Business', cls: 'src-fundainbusiness' },
};

const PLACEHOLDER = `<div class="card-img-placeholder">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/>
  </svg>
</div>`;

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(l) {
  const src = SRC[l.source] || { label: l.source, cls: '' };

  const imgHtml = l.image
    ? `<img class="card-img" src="${esc(l.image)}" alt="" loading="lazy"
         onerror="this.parentNode.innerHTML='${PLACEHOLDER.replace(/'/g, "\\'")}'">`
    : PLACEHOLDER;

  const priceBadge = l.price != null
    ? `<div class="price-badge">€${Math.round(l.price).toLocaleString('nl-NL')}<span style="font-size:.6em;font-weight:500;opacity:.7">/mnd</span></div>`
    : `<div class="price-badge unknown">Prijs onbekend</div>`;

  const areaBadge = l.area != null
    ? `<span class="area-tag">${Math.round(l.area)} m²</span>`
    : '';

  return `
    <div class="card">
      <a href="${esc(l.url)}" target="_blank" rel="noopener">
        <div class="card-img-wrap">
          ${imgHtml}
          ${priceBadge}
          <span class="source-badge ${src.cls}">${src.label}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(l.title)}</div>
          <div class="card-meta">
            ${areaBadge}
            <span class="date-tag">${esc(l.found_at || '')}</span>
          </div>
        </div>
      </a>
    </div>`;
}

let allListings = [];

function sort(arr, by) {
  const a = [...arr];
  if (by === 'price-asc')  a.sort((x,y) => (x.price ?? Infinity) - (y.price ?? Infinity));
  if (by === 'price-desc') a.sort((x,y) => (y.price ?? -1) - (x.price ?? -1));
  if (by === 'area-asc')   a.sort((x,y) => (x.area ?? Infinity) - (y.area ?? Infinity));
  return a;
}

function render() {
  const sorted = sort(allListings, document.getElementById('sort-select').value);
  const grid = document.getElementById('grid');
  grid.innerHTML = sorted.length
    ? sorted.map(renderCard).join('')
    : '<div class="state">Geen ruimtes gevonden.</div>';
}

document.getElementById('sort-select').addEventListener('change', render);

async function load() {
  try {
    const data = await fetch('./listings.json?' + Date.now()).then(r => r.json());
    document.getElementById('updated').textContent = data.last_updated ? `Bijgewerkt: ${data.last_updated}` : '';
    allListings = data.listings || [];
    const n = allListings.length;
    document.getElementById('count-label').innerHTML = `<b>${n}</b> ruimte${n !== 1 ? 's' : ''} gevonden`;
    render();
  } catch {
    document.getElementById('grid').innerHTML = '<div class="state">Laden mislukt.</div>';
  }
}

load();
</script>
</body>
</html>
